<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Advanced Healthcare Finder</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(to right,#dbeafe,#ffffff,#dcfce7);
}

.card:hover{
transform:translateY(-5px);
transition:0.3s;
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<section
id="loginPage"
class="min-h-screen flex items-center justify-center p-6">

<div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md">

<h1 class="text-4xl font-bold text-center text-blue-700 mb-8">

🏥 Advanced Healthcare Finder

</h1>

<input
id="nameInput"
type="text"
placeholder="Enter Your Name"
class="w-full p-4 border rounded-2xl mb-4">

<input
id="ageInput"
type="number"
placeholder="Enter Your Age"
class="w-full p-4 border rounded-2xl mb-4">

<div
class="bg-blue-100 p-4 rounded-2xl mb-3 text-center font-bold text-xl"
id="captchaBox">

</div>

<input
id="captchaInput"
type="text"
placeholder="Enter CAPTCHA"
class="w-full p-4 border rounded-2xl mb-5">

<button
onclick="loginUser()"
class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl text-xl font-bold">

Login

</button>

</div>

</section>

<!-- MAIN APP -->

<div id="mainApp" class="hidden">

<!-- NAVBAR -->

<nav
class="bg-white shadow-lg p-5 flex justify-between items-center sticky top-0 z-50">

<h1 class="text-3xl font-bold text-blue-700">

🩺 Healthcare Finder

</h1>

<div class="flex gap-3">

<button
onclick="openLanguageModal()"
class="bg-green-500 hover:bg-green-600 text-white px-5 py-3 rounded-xl font-bold">

🎤 Voice Guide

</button>

<button
onclick="stopVoice()"
class="bg-red-500 hover:bg-red-600 text-white px-5 py-3 rounded-xl font-bold">

⛔ Stop

</button>

</div>

</nav>

<!-- HERO -->

<section class="text-center py-10 px-5">

<h2
id="welcomeText"
class="text-5xl font-bold text-blue-700">

</h2>

<p class="mt-5 text-xl text-gray-600">

Search treatments, compare hospitals,
find affordable healthcare and book appointments.

</p>

</section>

<!-- SEARCH -->

<section class="px-6 pb-10">

<div class="max-w-5xl mx-auto bg-white p-8 rounded-3xl shadow-xl">

<div class="grid md:grid-cols-2 gap-5">

<input
id="treatmentInput"
type="text"
placeholder="Search Treatment or Scan"
class="w-full p-5 border rounded-2xl text-lg">

<input
id="budgetInput"
type="number"
placeholder="Enter Budget"
class="w-full p-5 border rounded-2xl text-lg">

</div>

<button
onclick="searchTreatment()"
class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl text-xl font-bold">

🔍 Search Hospitals

</button>

</div>

</section>

<!-- RESULTS -->

<section
id="results"
class="grid md:grid-cols-2 gap-8 p-6">

</section>

<!-- EMERGENCY -->

<section class="p-6">

<div
class="bg-red-500 text-white rounded-3xl p-10 text-center shadow-2xl">

<h2 class="text-5xl font-bold">

🚑 Emergency Support

</h2>

<p class="mt-5 text-lg">

24/7 Ambulance and Emergency Healthcare Services

</p>

<div class="mt-8 flex flex-wrap justify-center gap-5">

<button
onclick="window.location.href='tel:108'"
class="bg-white text-red-600 px-8 py-3 rounded-2xl font-bold">

Call Ambulance

</button>

<button
onclick="window.location.href='tel:102'"
class="bg-white text-red-600 px-8 py-3 rounded-2xl font-bold">

Emergency Call

</button>

</div>

</div>

</section>

</div>

<!-- LANGUAGE MODAL -->

<div
id="languageModal"
class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">

<div class="bg-white p-8 rounded-3xl w-80 text-center">

<h2 class="text-3xl font-bold text-blue-700 mb-6">

Select Language

</h2>

<div class="grid gap-4">

<button
onclick="startVoice('en-US')"
class="bg-blue-600 text-white py-3 rounded-xl">

English

</button>

<button
onclick="startVoice('kn-IN')"
class="bg-green-600 text-white py-3 rounded-xl">

Kannada

</button>

<button
onclick="startVoice('te-IN')"
class="bg-purple-600 text-white py-3 rounded-xl">

Telugu

</button>

<button
onclick="startVoice('hi-IN')"
class="bg-orange-600 text-white py-3 rounded-xl">

Hindi

</button>

</div>

<button
onclick="closeLanguageModal()"
class="mt-6 text-red-500 font-bold">

Close

</button>

</div>

</div>

<script>

let captchaText = "";

function generateCaptcha(){

captchaText =
Math.random().toString(36).substring(2,8);

document.getElementById("captchaBox")
.innerHTML = captchaText;

}

generateCaptcha();

function loginUser(){

const name =
document.getElementById("nameInput").value;

const age =
document.getElementById("ageInput").value;

const captcha =
document.getElementById("captchaInput").value;

if(name === "" || age === ""){

alert("Please fill all details");

return;

}

if(captcha !== captchaText){

alert("Invalid CAPTCHA");

generateCaptcha();

return;

}

document.getElementById("loginPage")
.classList.add("hidden");

document.getElementById("mainApp")
.classList.remove("hidden");

document.getElementById("welcomeText")
.innerHTML =
"Welcome " + name + " 👋";

}

const hospitals = [

{

name:"BKS Hospital Ballari",

rating:"4.7",

phone:"08392221111",

map:"https://maps.google.com/?q=BKS+Hospital+Ballari",

treatments:[

["MRI Scan",7000],
["Blood Test",1000],
["CT Scan",5000],
["Heart Surgery",350000]

]

},

{

name:"BHHC Hospital Ballari",

rating:"4.8",

phone:"08392222222",

map:"https://maps.google.com/?q=BHHC+Hospital+Ballari",

treatments:[

["MRI Scan",8000],
["Blood Test",1200],
["Chemotherapy",150000],
["Bone Surgery",220000]

]

},

{

name:"Aradhana Hospital",

rating:"4.6",

phone:"08392223333",

map:"https://maps.google.com/?q=Aradhana+Hospital",

treatments:[

["MRI Scan",6500],
["Pregnancy Scan",4000],
["Skin Treatment",20000],
["Eye Surgery",70000]

]

},

{

name:"Hrudayalaya Hospital",

rating:"4.9",

phone:"08392224444",

map:"https://maps.google.com/?q=Hrudayalaya+Hospital",

treatments:[

["Heart Scan",10000],
["Heart Surgery",400000],
["ECG",1200],
["Kidney Treatment",250000]

]

}

];

function searchTreatment(){

const treatment =
document.getElementById("treatmentInput")
.value.toLowerCase();

const budget =
parseInt(
document.getElementById("budgetInput").value
);

const result =
document.getElementById("results");

result.innerHTML = "";

let found = false;

hospitals.forEach(hospital => {

hospital.treatments.forEach(t => {

const treatmentName =
t[0].toLowerCase();

const cost = t[1];

if(
treatmentName.includes(treatment)
&& cost <= budget
){

found = true;

result.innerHTML += `

<div class="bg-white rounded-3xl p-8 shadow-2xl card">

<h2 class="text-3xl font-bold text-green-600">

${hospital.name}

</h2>

<p class="mt-3 text-lg">
⭐ Rating: ${hospital.rating}
</p>

<div class="mt-5 bg-gray-100 p-5 rounded-2xl">

<h3 class="text-2xl font-bold text-blue-700">

🩺 ${t[0]}

</h3>

<p class="mt-3 text-green-700 text-xl font-bold">

💰 ₹${cost}

</p>

</div>

<div class="grid grid-cols-2 gap-4 mt-8">

<button
onclick="window.location.href='tel:${hospital.phone}'"
class="bg-green-500 text-white py-3 rounded-xl font-bold">

📞 Call

</button>

<button
onclick="window.open('${hospital.map}')"
class="bg-purple-500 text-white py-3 rounded-xl font-bold">

📍 Maps

</button>

<button
onclick="bookAppointment('${hospital.name}')"
class="bg-blue-600 text-white py-3 rounded-xl font-bold">

📅 Appointment

</button>

<button
onclick="shareHospital('${hospital.name}')"
class="bg-pink-500 text-white py-3 rounded-xl font-bold">

📤 Share

</button>

</div>

</div>

`;

}

});

});

if(!found){

result.innerHTML = `

<div class="col-span-2 text-center text-3xl font-bold text-red-500">

No Hospitals Found Under Your Budget

</div>

`;

}

}

function bookAppointment(name){

const patient =
prompt("Enter Patient Name");

if(patient){

alert(
"✅ Appointment booked for "
+ patient +
" at " +
name
);

}

}

function shareHospital(name){

if(navigator.share){

navigator.share({

title:name,

text:"Check this hospital on Healthcare Finder",

url:window.location.href

});

}else{

alert("Sharing not supported");

}

}

function openLanguageModal(){

document.getElementById("languageModal")
.classList.remove("hidden");

}

function closeLanguageModal(){

document.getElementById("languageModal")
.classList.add("hidden");

}

function startVoice(lang){

let text = "";

if(lang === "en-US"){

text =
"Welcome to Advanced Healthcare Finder. First login using your name age and captcha. Then enter treatment name and your budget. The app will show hospitals and treatment costs. Use call button for hospital contact. Use maps button for navigation. Use appointment button to book appointments. Use emergency section for ambulance support.";

}

if(lang === "kn-IN"){

text =
"ಮೊದಲು ನಿಮ್ಮ ಹೆಸರು ವಯಸ್ಸು ಮತ್ತು ಕ್ಯಾಪ್ಚಾ ಬಳಸಿ ಲಾಗಿನ್ ಮಾಡಿ. ನಂತರ ಚಿಕಿತ್ಸೆ ಹೆಸರು ಮತ್ತು ನಿಮ್ಮ ಬಜೆಟ್ ನಮೂದಿಸಿ. ಆಪ್ ಆಸ್ಪತ್ರೆಗಳು ಮತ್ತು ಚಿಕಿತ್ಸೆಯ ವೆಚ್ಚವನ್ನು ತೋರಿಸುತ್ತದೆ.";

}

if(lang === "te-IN"){

text =
"ముందుగా మీ పేరు వయస్సు మరియు క్యాప్చా ఉపయోగించి లాగిన్ అవ్వండి. తర్వాత చికిత్స పేరు మరియు మీ బడ్జెట్ నమోదు చేయండి.";

}

if(lang === "hi-IN"){

text =
"पहले अपना नाम उम्र और कैप्चा डालकर लॉगिन करें। फिर इलाज का नाम और बजट डालें। ऐप अस्पताल और इलाज की कीमत दिखाएगा।";

}

const speech =
new SpeechSynthesisUtterance(text);

speech.lang = lang;

speech.rate = 1;

window.speechSynthesis.speak(speech);

closeLanguageModal();

}

function stopVoice(){

window.speechSynthesis.cancel();

}

</script>

</body>

</html>
