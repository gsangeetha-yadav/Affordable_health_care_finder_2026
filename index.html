function displayHospitals(data){

const container=document.getElementById("hospitalResults");

container.innerHTML="";

if(data.length===0){

container.innerHTML=`

<div class="card">

<h2>No Results Found ❌</h2>

<p>

Try Searching:<br><br>

• BHC <br>
• BALLARI Health City <br>
• BKS <br>
• Cardiology <br>
• Pediatrics <br>
• Dr Siddarth Joshi

</p>

</div>

`;

return;

}

data.forEach((hospital,hIndex)=>{

container.innerHTML += `

<div class="card">

<h2>${hospital.name}</h2>

<p><b>⭐ Rating:</b> ${hospital.rating}</p>

<p><b>📞 Phone:</b> ${hospital.phone}</p>

<h3 style="margin-top:15px;color:#0077ff;">
🏥 Departments & Doctors
</h3>

${hospital.departments.map((dep,dIndex)=>`

<button
class="department-btn"
onclick="toggleDepartment(${hIndex},${dIndex})">

${dep.department}

<br><br>

<span style="font-size:14px;">

${dep.doctors.join("<br>")}

</span>

</button>

<div
class="department-content"
id="department-${hIndex}-${dIndex}">

<p>

<b>👨‍⚕️ Doctors:</b><br>

${dep.doctors.join("<br>")}

</p>

<p>

<b>💰 Consultation Fee:</b><br>

${dep.fee}

</p>

<h4 style="margin-top:10px;">
🩺 Treatments Available
</h4>

<ul>

${dep.treatments.map(t=>`

<li>

<b>Medical Term:</b> ${t.medical}<br>

<b>Normal English:</b> ${t.normal}<br>

<b>Description:</b> ${t.description}<br>

<b>Approx Cost:</b> ${t.cost}

</li>

`).join("")}

</ul>

<div class="btns">

<button onclick="callHospital('${hospital.phone}')">
📞 Call
</button>

<button onclick="openMap('${hospital.name}')">
📍 Map
</button>

<button onclick="shareWebsite()">
📤 Share
</button>

</div>

</div>

`).join("")}

</div>

`;

});

}

function toggleDepartment(hIndex,dIndex){

const content=document.getElementById(
`department-${hIndex}-${dIndex}`
);

if(content.style.display==="block"){

content.style.display="none";

}else{

content.style.display="block";

}

}

function searchHospital(){

const input=document
.getElementById("searchInput")
.value
.toLowerCase()
.replace(/\s+/g,'');

const filtered=hospitals.filter(hospital=>{

const hospitalMatch=

hospital.name
.toLowerCase()
.replace(/\s+/g,'')
.includes(input)

||

hospital.keywords.some(keyword=>

keyword.toLowerCase()
.replace(/\s+/g,'')
.includes(input)

);

const departmentMatch=hospital.departments.some(dep=>

dep.department
.toLowerCase()
.replace(/\s+/g,'')
.includes(input)

||

dep.doctors.some(doc=>

doc.toLowerCase()
.replace(/\s+/g,'')
.includes(input)

)

);

return hospitalMatch || departmentMatch;

});

displayHospitals(filtered);

}

function callHospital(phone){

window.location.href="tel:"+phone;

}

function openMap(name){

window.open(
"https://www.google.com/maps/search/"+name,
"_blank"
);

}

function shareWebsite(){

if(navigator.share){

navigator.share({

title:"Affordable Healthcare Finder",

text:"Find hospitals, doctors and treatment costs easily",

url:window.location.href

});

}else{

alert("Sharing not supported");

}

}

function callAmbulance(){

window.location.href="tel:108";

}

function callEmergency(){

window.location.href="tel:102";

}

function startVoiceGuide(){

const speech=new SpeechSynthesisUtterance(

"Welcome to Affordable Healthcare Finder. Search hospitals, departments or doctors. Click any department to see treatments, consultation fees and doctor availability."

);

speech.lang="en-US";

window.speechSynthesis.speak(speech);

}

displayHospitals(hospitals);
