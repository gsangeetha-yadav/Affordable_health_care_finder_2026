function displayHospitals(data){

const container=document.getElementById("hospitalResults");

container.innerHTML="";

if(data.length===0){

container.innerHTML="<h2>No Results Found</h2>";

return;

}

data.forEach(hospital=>{

let departmentHTML="";

hospital.departments.forEach(dep=>{

departmentHTML += `

<h3>🏥 ${dep.department}</h3>

<p><b>👨‍⚕️ Doctors:</b><br>${dep.doctors.join("<br>")}</p>

<p><b>💰 Consultation:</b> ${dep.fee}</p>

<p><b>🩺 Treatments:</b></p>

<ul>

${dep.treatments.map(t=>`<li>${t}</li>`).join("")}

</ul>

`;

});

container.innerHTML += `

<div class="card">

<h2>${hospital.name}</h2>

<p>⭐ Rating: ${hospital.rating}</p>

${departmentHTML}

<div class="btns">

<button onclick="callHospital('${hospital.phone}')">
📞 Call
</button>

<button onclick="openMap('${hospital.name}')">
📍 Map
</button>

<button onclick="shareWebsite()">
📤 Share
</button>

</div>

</div>

`;

});

}

function searchHospital(){

const input=document
.getElementById("searchInput")
.value
.toLowerCase()
.replace(/\s+/g,'');

const filtered=hospitals.filter(hospital=>{

const hospitalMatch=hospital.name
.toLowerCase()
.replace(/\s+/g,'')
.includes(input);

const depMatch=hospital.departments.some(dep=>

dep.department.toLowerCase().replace(/\s+/g,'').includes(input)

||

dep.doctors.some(doc=>

doc.toLowerCase().replace(/\s+/g,'').includes(input)

)

||

dep.treatments.some(t=>

t.toLowerCase().replace(/\s+/g,'').includes(input)

)

);

return hospitalMatch || depMatch;

});

displayHospitals(filtered);

}

function callHospital(phone){

window.location.href="tel:"+phone;

}

function openMap(name){

window.open(
"https://www.google.com/maps/search/"+name,
"_blank"
);

}

function shareWebsite(){

if(navigator.share){

navigator.share({

title:"Affordable Healthcare Finder",

text:"Search hospitals and treatments easily",

url:window.location.href

});

}else{

alert("Sharing not supported");

}

}

let speech;

function startVoice(){

const lang=document.getElementById("language").value;

speech=new SpeechSynthesisUtterance(

"Welcome to Affordable Healthcare Finder. Search hospitals doctors departments and treatment costs easily. Use search box to find hospitals doctors and treatments. Use call button for hospital contact and map button for location guidance. Ambulance and emergency buttons are available below."

);

speech.lang=lang;

window.speechSynthesis.speak(speech);

}

function stopVoice(){

window.speechSynthesis.cancel();

}

function callAmbulance(){

window.location.href="tel:108";

}

function callEmergency(){

window.location.href="tel:102";

}
